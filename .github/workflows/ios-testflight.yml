name: iOS TestFlight

on:
  push:
    tags:
      - "ios-v*"

concurrency:
  group: ios-testflight
  cancel-in-progress: true

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      VITE_API_URL: https://api.puretype.app
      VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}
      VITE_GOOGLE_IOS_CLIENT_ID: ${{ secrets.VITE_GOOGLE_IOS_CLIENT_ID }}
      VITE_APPLE_SERVICES_ID: ${{ secrets.VITE_APPLE_SERVICES_ID }}
      VITE_APPLE_REDIRECT_URL: ${{ secrets.VITE_APPLE_REDIRECT_URL }}
      VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/frontend/ios

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Generate backend client (consumed by frontend)
        working-directory: apps/backend
        run: |
          bun run prisma:generate
          bun run client:generate

      - name: Build web bundle + sync iOS
        working-directory: apps/frontend
        run: |
          bun run build
          bunx cap sync ios

      - name: Write ASC API key to disk
        run: |
          mkdir -p "$HOME/.appstoreconnect"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_CONTENT" > "$HOME/.appstoreconnect/key.p8"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$HOME/.appstoreconnect/key.p8" >> "$GITHUB_ENV"

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      # No explicit profile download — fastlane's `sigh` (called inside the
      # `beta` lane) creates/regenerates the App Store distribution profile
      # via the ASC API every run. Pre-downloading via the GH action only
      # works for profiles manually registered in Apple Developer Portal,
      # which Xcode-managed automatic profiles aren't.

      - name: Fastlane beta
        working-directory: apps/frontend/ios
        run: bundle exec fastlane beta
