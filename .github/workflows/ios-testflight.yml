name: iOS TestFlight

on:
  push:
    tags:
      - "ios-v*"

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      VITE_API_URL: https://eos-backend-todoroappatma-4183s-projects.vercel.app

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: apps/frontend/ios

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Build web bundle + sync iOS
        working-directory: apps/frontend
        run: |
          bun run build
          bunx cap sync ios

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Download provisioning profile
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id: com.atma.eos.app
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT_RAW }}

      - name: Fastlane beta
        working-directory: apps/frontend/ios
        run: bundle exec fastlane beta
